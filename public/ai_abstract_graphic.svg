<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1221" />
      <stop offset="100%" stop-color="#111c33" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7D29" />
      <stop offset="100%" stop-color="#ff9954" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Achtergrond -->
  <rect width="100%" height="100%" fill="url(#bg)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstracte Vormen (AI / Hersenen metafoor) -->
  <g filter="url(#glow)">
    <circle cx="350" cy="300" r="160" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="450" cy="300" r="130" fill="none" stroke="rgba(255,125,41,0.2)" stroke-width="4" opacity="0.8"/>
    
    <!-- Connecties -->
    <path d="M 200 450 Q 400 150 600 450" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <path d="M 250 150 Q 400 450 550 150" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 100 300 Q 400 300 700 300" fill="none" stroke="rgba(255,125,41,0.4)" stroke-width="1" stroke-dasharray="10 10"/>
  </g>

  <!-- Knooppunten (Menselijke / Tech verbinding) -->
  <circle cx="200" cy="450" r="8" fill="#FF7D29" />
  <circle cx="600" cy="450" r="8" fill="#FF7D29" />
  <circle cx="250" cy="150" r="5" fill="#ffffff" opacity="0.6"/>
  <circle cx="550" cy="150" r="5" fill="#ffffff" opacity="0.6"/>
  <circle cx="400" cy="300" r="12" fill="#FF7D29" />
  
  <circle cx="100" cy="300" r="4" fill="#FF7D29" opacity="0.5"/>
  <circle cx="700" cy="300" r="4" fill="#FF7D29" opacity="0.5"/>

  <!-- Tech overlay accenten -->
  <rect x="80" y="80" width="30" height="4" fill="#FF7D29" opacity="0.8"/>
  <rect x="80" y="90" width="15" height="2" fill="#ffffff" opacity="0.3"/>
  
  <rect x="690" y="520" width="30" height="4" fill="#FF7D29" opacity="0.8"/>
  <rect x="705" y="530" width="15" height="2" fill="#ffffff" opacity="0.3"/>
</svg>
